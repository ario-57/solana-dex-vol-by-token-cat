name: Blockworks to Dune Sync

on:
  workflow_dispatch:
  schedule:
    # Runs once per day at 15:00 Turkey time (12:00 UTC).
    - cron: "0 12 * * *"

concurrency:
  group: blockworks-dune-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run sync
        env:
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
          DUNE_IS_PRIVATE: "false"
          SYNC_DATASETS: all
          REFRESH_LOOKBACK_DAYS: "7"
        run: python blockworks_dune_sync.py

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
          else
            git commit -m "Update Blockworks Dune CSV"
            git push
          fi
